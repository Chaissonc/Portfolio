<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#4361EE">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Calculator</title>
</head>
<body>

    <nav class="back-nav">
        <a href="../../index.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Portfolio
        </a>
    </nav>

    <main>
        <div id="calculator">
            <input id="display" readonly placeholder="0">
            <div id="keys">
                <button onclick="clearDisplay()" class="operator-btn">AC</button>
                <button onclick="backspace()" class="operator-btn">⌫</button>
                <button onclick="appendToDisplay('/')" class="operator-btn">÷</button>
                <button onclick="appendToDisplay('*')" class="operator-btn">×</button>

                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('-')" class="operator-btn">−</button>

                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('+')" class="operator-btn">+</button>

                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="calculate()" class="equals-btn" style="grid-row: span 2;">=</button>

                <button onclick="appendToDisplay('0')" class="zero-btn">0</button>
                <button onclick="appendToDisplay('.')">.</button>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
