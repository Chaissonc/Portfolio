<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Rock Paper Scissors</title>
</head>
<body>

    <nav class="back-nav">
        <a href="../../index.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Portfolio
        </a>
    </nav>

    <main>

        <div class="page-header">
            <h1>Rock Paper Scissors</h1>
            <p>Choose your weapon</p>
        </div>

        <div class="scoreboard">
            <div class="score-card">
                <span class="score-label">You</span>
                <span class="score-value player-score" id="playerScoreDisplay">0</span>
            </div>
            <div class="score-sep">vs</div>
            <div class="score-card">
                <span class="score-label">Computer</span>
                <span class="score-value computer-score" id="computerScoreDisplay">0</span>
            </div>
        </div>

        <div class="arena">
            <div class="pick-wrap">
                <div class="pick-emoji" id="playerEmoji">?</div>
                <div class="pick-name" id="playerDisplay">Your pick</div>
            </div>
            <div class="arena-vs">vs</div>
            <div class="pick-wrap">
                <div class="pick-emoji" id="computerEmoji">?</div>
                <div class="pick-name" id="computerDisplay">Computer</div>
            </div>
        </div>

        <div id="resultDisplay" class="result-message">Make your move</div>

        <div class="choices">
            <button class="choice-btn" onclick="playGame('Rock')">
                <span class="choice-emoji">✊</span>
                <span class="choice-label">Rock</span>
            </button>
            <button class="choice-btn" onclick="playGame('Paper')">
                <span class="choice-emoji">🖐️</span>
                <span class="choice-label">Paper</span>
            </button>
            <button class="choice-btn" onclick="playGame('Scissors')">
                <span class="choice-emoji">✌️</span>
                <span class="choice-label">Scissors</span>
            </button>
        </div>

        <button class="reset-btn" onclick="resetScores()">Reset Scores</button>

    </main>

    <script src="index.js"></script>
</body>
</html>
